<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Notices | IRE - IoT & Robotics Engineering</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .notices-grid { display: flex; flex-direction: column; gap: 1.2rem; }
        .notice-card { background: rgba(10,20,35,0.65); backdrop-filter: blur(12px); border-radius: 1.5rem; border: 1px solid rgba(76,201,255,0.25); padding: 1.5rem; transition: all 0.2s; }
        .notice-date { font-size: 0.8rem; color: #8bb9fe; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 8px; }
        .notice-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 0.75rem; color: #fff; }
        .notice-desc { font-size: 0.95rem; color: #cddff9; line-height: 1.5; }
    </style>
</head>
<body>
<div class="tech-bg"></div>
<div class="container">
    <div class="navbar">
        <div class="logo-area"><div class="university-logo"><img src="images/logo.png" alt="Logo" style="width:100%; height:100%; object-fit:cover;" onerror="this.onerror=null; this.parentElement.innerHTML='<i class=\'fas fa-microchip\'></i>';"></div><div class="univ-title"><h1>University of Frontier Technology, Bangladesh</h1><p><i class="fas fa-robot"></i> Internet of Things and Robotics Engineering (IRE)</p></div></div>
        <div class="nav-links">
            <a href="index.html">🏠 Home</a> <a href="routine.html">📅 Routine</a> <a href="courses.html">📚 Courses</a> <a href="events.html">🎉 Events</a> <a href="notices.html" class="active">📢 Notices</a> <a href="batchfund.html">💰 ব্যাচ ফান্ড</a>
            <a href="#" id="umsNavLink" target="_blank"><i class="fas fa-graduation-cap"></i> UMS</a> <a href="#" id="moodleNavLink" target="_blank"><i class="fas fa-chalkboard"></i> Moodle</a>
        </div>
    </div>
    <div class="section-container"><div class="section-title"><i class="fas fa-bullhorn"></i> Notice Board</div><div class="notices-grid" id="noticesGrid"></div></div>
</div>
<footer>...</footer>
<script type="module">
    import { supabase } from './supabase.js';
    async function loadNotices() {
        const { data, error } = await supabase.from('notices').select('*').order('id', { ascending: false });
        if (!error && data) {
            document.getElementById('noticesGrid').innerHTML = data.map(n => `
                <div class="notice-card">
                    <div class="notice-date"><i class="far fa-calendar-alt"></i> ${n.date}</div>
                    <div class="notice-title">${n.icon} ${n.title}</div>
                    <div class="notice-desc">${n.description}</div>
                </div>
            `).join('');
        }
    }
    loadNotices();
    supabase.channel('notices_changes').on('postgres_changes', { event: '*', schema: 'public', table: 'notices' }, () => loadNotices()).subscribe();
    const UMS_URL = "https://ums.uftb.ac.bd/Login/Index";
    const MOODLE_URL = "https://moodle.uftb.ac.bd/login/index.php";
    document.getElementById('umsNavLink').href = UMS_URL;
    document.getElementById('moodleNavLink').href = MOODLE_URL;
</script>
</body>
</html>
