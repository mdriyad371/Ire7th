<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Admin Panel | IRE Department</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: radial-gradient(circle at 20% 30%, #0a0f1a, #03060c); color: #eef4ff; min-height: 100vh; }
        .tech-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 20% 30%, #0a0f1a, #03060c); z-index: -2; }
        .login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5,5,16,0.96); backdrop-filter: blur(16px); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .login-card { background: rgba(12,22,40,0.85); backdrop-filter: blur(20px); border-radius: 1.5rem; border: 1px solid rgba(0,242,255,0.5); padding: 1.5rem; width: 90%; max-width: 350px; text-align: center; }
        .login-card .logo-icon { font-size: 3rem; color: #00f2ff; margin-bottom: 0.8rem; }
        .login-card h2 { font-size: 1.5rem; background: linear-gradient(135deg, #fff, #00f2ff); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .login-card input { width: 100%; padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid rgba(0,242,255,0.4); border-radius: 1rem; color: white; margin: 10px 0; }
        .login-card button { width: 100%; padding: 10px; background: linear-gradient(135deg, #00f2ff, #00b8c4); border: none; border-radius: 2rem; color: #050510; font-weight: 700; cursor: pointer; }
        .admin-content { display: none; max-width: 1400px; margin: 0 auto; padding: 15px; }
        .admin-header { background: linear-gradient(135deg, rgba(0,242,255,0.15), rgba(255,51,102,0.15)); backdrop-filter: blur(10px); padding: 12px 20px; border-radius: 1.5rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 20px; }
        .admin-header h1 { font-size: 1.2rem; }
        .logout-btn { background: rgba(255,77,109,0.2); border: 1px solid #ff4d6d; color: #ff4d6d; padding: 6px 15px; border-radius: 40px; cursor: pointer; }
        .nav-tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .nav-tab { padding: 6px 15px; background: rgba(0,242,255,0.08); border-radius: 40px; cursor: pointer; font-size: 0.8rem; }
        .nav-tab.active { background: #00f2ff; color: #050510; }
        .admin-section { background: rgba(12,22,40,0.7); backdrop-filter: blur(12px); border-radius: 1.2rem; padding: 15px; margin-bottom: 20px; }
        .section-title { font-size: 1rem; margin-bottom: 12px; border-left: 3px solid #00f2ff; padding-left: 10px; font-weight: 600; }
        .form-group { margin-bottom: 12px; }
        label { font-size: 0.7rem; color: #a0d0ff; display: block; margin-bottom: 4px; }
        input, textarea, select { width: 100%; padding: 8px; background: rgba(0,0,0,0.5); border: 1px solid rgba(0,242,255,0.4); border-radius: 12px; color: white; font-size: 0.75rem; }
        button { background: linear-gradient(135deg, #00f2ff, #00b8c4); border: none; padding: 6px 15px; border-radius: 40px; color: #050510; font-weight: 600; cursor: pointer; font-size: 0.7rem; margin-right: 5px; margin-top: 5px; }
        button.danger { background: linear-gradient(135deg, #ff4d6d, #cc2b4a); color: white; }
        .item-card { background: rgba(0,0,0,0.4); border-radius: 12px; padding: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; font-size: 0.75rem; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .success-msg { background: #00ff8844; border: 1px solid #00ff88; padding: 8px; border-radius: 12px; margin-top: 10px; display: none; font-size: 0.7rem; }
        .semester-badge { background: #00f2ff20; padding: 2px 8px; border-radius: 20px; font-size: 0.6rem; margin-left: 6px; color: #00f2ff; }
        @media (max-width: 700px) { .grid-2 { grid-template-columns: 1fr; } .nav-tabs { justify-content: center; } }
    </style>
</head>
<body>
<div class="tech-bg"></div>
<div id="loginOverlay" class="login-overlay">
    <div class="login-card">
        <div class="logo-icon"><i class="fas fa-shield-alt"></i></div>
        <h2>Admin Access</h2>
        <input type="password" id="adminPassword" placeholder="Password">
        <button id="loginBtn">Login</button>
        <div id="loginError" style="color:#ff4d6d; margin-top:8px; font-size:0.7rem;"></div>
    </div>
</div>
<div id="adminContent" class="admin-content">
    <div class="admin-header"><h1><i class="fas fa-cog"></i> Admin Panel</h1><button class="logout-btn" id="logoutBtn">Logout</button></div>
    <div class="nav-tabs">
        <div class="nav-tab" data-tab="notices">📢 Notices</div><div class="nav-tab" data-tab="events">🎉 Events</div>
        <div class="nav-tab" data-tab="courses">📚 Courses</div><div class="nav-tab" data-tab="routine">📅 Routine</div>
        <div class="nav-tab" data-tab="fundaccounts">💰 Fund</div><div class="nav-tab" data-tab="settings">⚙️ Settings</div>
    </div>
    <div id="notices-tab" class="tab-content"><div class="admin-section"><div class="section-title">Manage Notices</div><div class="form-group"><label>Title</label><input id="noticeTitle"></div><div class="form-group"><label>Date</label><input id="noticeDate"></div><div class="form-group"><label>Description</label><textarea id="noticeDesc" rows="2"></textarea></div><button onclick="addNotice()">Add Notice</button><div class="item-list" id="noticesList"></div><div id="noticeSuccess" class="success-msg"></div></div></div>
    <div id="events-tab" class="tab-content"><div class="admin-section"><div class="section-title">Manage Events</div><div class="form-group"><label>Title</label><input id="eventTitle"></div><div class="form-group"><label>Date</label><input id="eventDate"></div><div class="form-group"><label>Description</label><textarea id="eventDesc" rows="2"></textarea></div><button onclick="addEvent()">Add Event</button><div class="item-list" id="eventsList"></div><div id="eventSuccess" class="success-msg"></div></div></div>
    <div id="courses-tab" class="tab-content"><div class="admin-section"><div class="section-title">Manage Courses (Semester Wise)</div><div class="grid-2"><div><div class="form-group"><label>Code</label><input id="courseCode"></div><div class="form-group"><label>Title</label><input id="courseTitle"></div></div><div><div class="form-group"><label>Credit</label><input id="courseCredit"></div><div class="form-group"><label>Teacher</label><input id="courseTeacher"></div><div class="form-group"><label>Semester</label><select id="courseSemester"><option value="">Select</option><option value="L1T1">L1T1</option><option value="L1T2">L1T2</option><option value="L2T1">L2T1</option><option value="L2T2">L2T2</option><option value="L3T1">L3T1</option><option value="L3T2">L3T2</option><option value="L4T1">L4T1</option><option value="L4T2">L4T2</option></select></div></div></div><button onclick="addCourse()">Add Course</button><div class="item-list" id="coursesList"></div><div id="courseSuccess" class="success-msg"></div></div></div>
    <div id="routine-tab" class="tab-content"><div class="admin-section"><div class="section-title">Manage Routine</div><div class="grid-2"><div><div class="form-group"><label>Day</label><select id="routineDay"><option>Sunday</option><option>Monday</option><option>Tuesday</option><option>Wednesday</option><option>Thursday</option></select></div><div class="form-group"><label>Start</label><input type="time" id="routineStart"></div></div><div><div class="form-group"><label>End</label><input type="time" id="routineEnd"></div><div class="form-group"><label>Course</label><input id="routineCourse"></div><div class="form-group"><label>Room</label><input id="routineRoom"></div></div></div><button onclick="addRoutine()">Add Class</button><div class="item-list" id="routineList"></div><div id="routineSuccess" class="success-msg"></div></div></div>
    <div id="fundaccounts-tab" class="tab-content"><div class="admin-section"><div class="section-title">Fund Balance</div><div class="form-group"><label>Current Balance (৳)</label><input type="number" id="balanceAmount"></div><button onclick="updateBalance()">Update Balance</button><div id="balanceSuccess" class="success-msg"></div></div></div>
    <div id="settings-tab" class="tab-content"><div class="admin-section"><div class="section-title">Change Admin Password</div><div class="grid-2"><div><div class="form-group"><label>New Password</label><input type="password" id="newPassword"></div></div><div><div class="form-group"><label>Confirm</label><input type="password" id="confirmPassword"></div></div></div><button onclick="changePassword()">Save</button><div id="settingsSuccess" class="success-msg"></div></div></div>
</div>
<script type="module">
    import { supabase } from './supabase.js';
    const DEFAULT_PASSWORD = "ire2026";
    function getAdminPassword(){ let c=localStorage.getItem('admin_custom_password'); return c?c:DEFAULT_PASSWORD; }
    const loginOverlay=document.getElementById('loginOverlay'),adminContent=document.getElementById('adminContent');
    function checkLogin(){ if(sessionStorage.getItem('admin_logged_in')==='true'){ loginOverlay.style.display='none'; adminContent.style.display='block'; }else{ loginOverlay.style.display='flex'; adminContent.style.display='none'; } }
    document.getElementById('loginBtn').onclick=()=>{ if(document.getElementById('adminPassword').value===getAdminPassword()){ sessionStorage.setItem('admin_logged_in','true'); checkLogin(); location.reload(); }else{ document.getElementById('loginError').innerText='Wrong password'; } };
    document.getElementById('logoutBtn').onclick=()=>{ sessionStorage.removeItem('admin_logged_in'); checkLogin(); };
    function showMsg(id,msg){ let e=document.getElementById(id); if(e){ e.textContent=msg; e.style.display='block'; setTimeout(()=>e.style.display='none',3000); } }
    async function loadNotices(){ let {data}=await supabase.from('notices').select('*').order('id',{ascending:false}); if(data) document.getElementById('noticesList').innerHTML=data.map(n=>`<div class="item-card"><div>${n.icon} ${n.title}<br><span style="font-size:0.6rem;">${n.date}</span></div><button class="danger" onclick="deleteNotice(${n.id})">🗑️</button></div>`).join(''); }
    window.deleteNotice=async(id)=>{ await supabase.from('notices').delete().eq('id',id); loadNotices(); };
    window.addNotice=async()=>{ let t=document.getElementById('noticeTitle').value, d=document.getElementById('noticeDate').value, desc=document.getElementById('noticeDesc').value; if(!t||!d) return; await supabase.from('notices').insert([{title:t,date:d,description:desc,icon:'📢'}]); loadNotices(); showMsg('noticeSuccess','Added'); };
    async function loadEvents(){ let {data}=await supabase.from('events').select('*').order('id',{ascending:false}); if(data) document.getElementById('eventsList').innerHTML=data.map(e=>`<div class="item-card"><div>${e.icon} ${e.title}<br><span>${e.date}</span></div><button class="danger" onclick="deleteEvent(${e.id})">🗑️</button></div>`).join(''); }
    window.deleteEvent=async(id)=>{ await supabase.from('events').delete().eq('id',id); loadEvents(); };
    window.addEvent=async()=>{ let t=document.getElementById('eventTitle').value, d=document.getElementById('eventDate').value, desc=document.getElementById('eventDesc').value; if(!t||!d) return; await supabase.from('events').insert([{title:t,date:d,description:desc,icon:'🎉'}]); loadEvents(); showMsg('eventSuccess','Added'); };
    async function loadCourses(){ let {data}=await supabase.from('courses').select('*').order('semester'); if(data) document.getElementById('coursesList').innerHTML=data.map(c=>`<div class="item-card"><div><strong>${c.code}</strong> ${c.title}<span class="semester-badge">${c.semester}</span><br>${c.credit} Credits | ${c.teacher}</div><div><button onclick="editCourse(${c.id},'${c.code}','${c.title}','${c.credit}','${c.teacher}','${c.semester}')">✏️</button><button class="danger" onclick="deleteCourse(${c.id})">🗑️</button></div></div>`).join(''); }
    window.deleteCourse=async(id)=>{ if(confirm('Delete?')){ await supabase.from('courses').delete().eq('id',id); loadCourses(); } };
    window.editCourse=(id,code,title,credit,teacher,semester)=>{ document.getElementById('courseCode').value=code; document.getElementById('courseTitle').value=title; document.getElementById('courseCredit').value=credit; document.getElementById('courseTeacher').value=teacher; document.getElementById('courseSemester').value=semester; window.deleteCourse(id); };
    window.addCourse=async()=>{ let code=document.getElementById('courseCode').value, title=document.getElementById('courseTitle').value, credit=document.getElementById('courseCredit').value, teacher=document.getElementById('courseTeacher').value, sem=document.getElementById('courseSemester').value; if(!code||!title||!sem) return; await supabase.from('courses').insert([{code,title,credit,teacher,semester:sem}]); loadCourses(); showMsg('courseSuccess','Added'); };
    async function loadRoutine(){ let {data}=await supabase.from('routine').select('*'); if(data) document.getElementById('routineList').innerHTML=data.map(r=>`<div class="item-card"><div>${r.day} | ${r.start_time}-${r.end_time}<br>${r.course} | Room ${r.room}</div><div><button onclick="editRoutine(${r.id},'${r.day}','${r.start_time}','${r.end_time}','${r.course}','${r.room}')">✏️</button><button class="danger" onclick="deleteRoutine(${r.id})">🗑️</button></div></div>`).join(''); }
    window.deleteRoutine=async(id)=>{ await supabase.from('routine').delete().eq('id',id); loadRoutine(); };
    window.editRoutine=(id,day,start,end,course,room)=>{ document.getElementById('routineDay').value=day; document.getElementById('routineStart').value=start; document.getElementById('routineEnd').value=end; document.getElementById('routineCourse').value=course; document.getElementById('routineRoom').value=room; window.deleteRoutine(id); };
    window.addRoutine=async()=>{ let day=document.getElementById('routineDay').value, start=document.getElementById('routineStart').value, end=document.getElementById('routineEnd').value, course=document.getElementById('routineCourse').value, room=document.getElementById('routineRoom').value; if(!day||!start||!end||!course) return; await supabase.from('routine').insert([{day,start_time:start,end_time:end,course,room}]); loadRoutine(); showMsg('routineSuccess','Added'); };
    async function loadBalance(){ let {data}=await supabase.from('fund_balance').select('amount').limit(1); if(data&&data.length) document.getElementById('balanceAmount').value=data[0].amount; }
    window.updateBalance=async()=>{ let amt=parseFloat(document.getElementById('balanceAmount').value); if(isNaN(amt)) return; await supabase.from('fund_balance').update({amount:amt,updated_at:new Date()}).eq('id',1); showMsg('balanceSuccess','Updated'); };
    window.changePassword=()=>{ let np=document.getElementById('newPassword').value, cp=document.getElementById('confirmPassword').value; if(!np) return; if(np!==cp){ showMsg('settingsSuccess','Passwords do not match','error'); return; } localStorage.setItem('admin_custom_password',np); showMsg('settingsSuccess','Password changed!'); };
    function init(){ loadNotices(); loadEvents(); loadCourses(); loadRoutine(); loadBalance(); }
    document.querySelectorAll('.nav-tab').forEach(t=>{ t.onclick=()=>{ document.querySelectorAll('.nav-tab').forEach(tt=>tt.classList.remove('active')); t.classList.add('active'); document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active')); document.getElementById(`${t.dataset.tab}-tab`).classList.add('active'); }; });
    document.querySelector('.nav-tab').click();
    checkLogin(); if(adminContent.style.display==='block') init();
</script>
</body>
</html>
