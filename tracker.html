<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>টাইম ট্র্যাকার | IRE - IoT & Robotics Engineering</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0f1f; font-family: 'Inter', 'Space Grotesk', sans-serif; color: #f0f3ff; overflow-x: hidden; padding-bottom: 80px; }
        .tech-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 20% 10%, #01031a, #000000); z-index: -2; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; position: relative; z-index: 2; }
        
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(5,15,30,0.95); backdrop-filter: blur(12px); display: flex; justify-content: space-around; align-items: center; padding: 8px 12px 18px; border-top: 1px solid rgba(0,242,255,0.3); z-index: 100; }
        .nav-item { background: none; border: none; color: #8e9aaf; display: flex; flex-direction: column; align-items: center; gap: 3px; font-size: 0.6rem; cursor: pointer; padding: 4px 10px; border-radius: 40px; transition: 0.2s; }
        .nav-item i { font-size: 1.1rem; }
        .nav-item.active { color: #00f2ff; background: #00f2ff20; }
        
        .glass-card { background: rgba(10,20,35,0.6); backdrop-filter: blur(10px); border-radius: 1.2rem; padding: 1rem; margin-bottom: 1rem; border: 1px solid rgba(0,242,255,0.15); }
        .section-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.8rem; color: #00f2ff; display: flex; align-items: center; gap: 8px; }
        .stats-row { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
        .stat-box { background: rgba(0,0,0,0.3); padding: 8px; border-radius: 12px; flex: 1; text-align: center; }
        .stat-number { font-size: 1.2rem; font-weight: bold; color: #00f2ff; }
        .stat-label { font-size: 0.6rem; color: #94a3b8; }
        canvas { max-height: 150px; width: 100% !important; margin: 8px 0; }
        .timer-display { font-size: 2.5rem; font-weight: 700; font-family: monospace; text-align: center; background: #0f172a; color: white; padding: 12px; border-radius: 40px; letter-spacing: 2px; }
        .btn-group { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; justify-content: center; }
        button { background: #3b82f6; border: none; padding: 10px 20px; border-radius: 40px; font-weight: 600; color: white; cursor: pointer; font-size: 0.85rem; }
        button.secondary { background: #1e2a3e; color: #e0e5f0; }
        button.danger { background: #ef4444; }
        button.success { background: #10b981; }
        
        .goal-item { background: rgba(0,0,0,0.3); border: 1px solid rgba(0,242,255,0.2); border-radius: 12px; margin-bottom: 12px; overflow: hidden; }
        .goal-header { padding: 10px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.2); font-size: 0.85rem; }
        .goal-name { font-weight: 600; }
        .subtask-list { padding: 6px 10px; }
        .subtask-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; margin: 4px 0; border-radius: 10px; cursor: pointer; gap: 8px; flex-wrap: wrap; font-size: 0.75rem; transition: 0.2s; }
        .subtask-item:hover { background: rgba(0,242,255,0.1); }
        .subtask-item.selected { background: #00f2ff30; border: 1px solid #00f2ff; }
        .subtask-name { flex: 1; font-weight: 500; }
        .subtask-code { font-size: 0.65rem; color: #00f2ff; font-family: monospace; margin-right: 8px; }
        .progress-bar-bg { background: #1e2a3e; border-radius: 10px; height: 4px; overflow: hidden; width: 70px; }
        .progress-fill { background: #00f2ff; height: 100%; width: 0%; border-radius: 10px; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .note-box { background: rgba(0,242,255,0.08); border-radius: 10px; padding: 8px; text-align: center; margin-top: 10px; font-size: 0.7rem; color: #7bc5ff; }
        .running-status { background: #10b98120; border: 1px solid #10b981; border-radius: 30px; padding: 4px 12px; font-size: 0.7rem; display: inline-flex; align-items: center; gap: 6px; }
        .paused-status { background: #f59e0b20; border: 1px solid #f59e0b; border-radius: 30px; padding: 4px 12px; font-size: 0.7rem; display: inline-flex; align-items: center; gap: 6px; }
        .daily-reset-badge { background: #3b82f620; border: 1px solid #3b82f6; border-radius: 30px; padding: 4px 12px; font-size: 0.65rem; display: inline-flex; align-items: center; gap: 6px; }
        footer { background: rgba(3,8,20,0.85); border-radius: 1rem; padding: 0.8rem; text-align: center; margin-top: 1.5rem; font-size: 0.6rem; }
        @media (max-width: 600px) { .container { padding: 12px; } .timer-display { font-size: 1.8rem; } button { padding: 6px 14px; font-size: 0.7rem; } }
    </style>
</head>
<body>
<div class="tech-bg"></div>
<div class="container">
    <div id="trackerContent"></div>
    <footer><i class="fas fa-code"></i> Developed by <strong>Md Riyad Hossen</strong> (IRE 7th Batch)<br>© 2026 Department of IoT & Robotics Engineering | UFTB</footer>
</div>
<div class="bottom-nav">
    <button class="nav-item" data-page="index.html"><i class="fas fa-home"></i><span>হোম</span></button>
    <button class="nav-item" data-page="routine.html"><i class="fas fa-calendar-alt"></i><span>রুটিন</span></button>
    <button class="nav-item active" data-page="tracker.html"><i class="fas fa-stopwatch"></i><span>টাইম ট্র্যাকার</span></button>
    <button class="nav-item" data-page="settings.html"><i class="fas fa-cog"></i><span>সেটিংস</span></button>
</div>
<script>
    // ==================== ডেমো ডাটা ====================
    let goals = [], taskLogs = [], selectedSubtask = null, progressChart = null;
    
    // টাইমার স্টেট
    let timerState = {
        isRunning: false,
        startTime: null,
        pausedDuration: 0,
        currentGoalId: null,
        currentSubtaskId: null,
        currentSubtaskName: "",
        totalElapsed: 0,
        lastDate: null          // শেষ রিসেটের তারিখ
    };
    
    // ডিফল্ট ডাটা
    function initDefaultTrackerData() {
        return [{
            id: 101,
            name: "📚 Study",
            pinned: true,
            subtasks: [
                { id: 1011, name: "IRE 117", code: "IRE 117", loggedSeconds: 0, targetMinutes: 180 },
                { id: 1012, name: "CSE 113", code: "CSE 113", loggedSeconds: 0, targetMinutes: 180 },
                { id: 1013, name: "CSE 115", code: "CSE 115", loggedSeconds: 0, targetMinutes: 180 },
                { id: 1014, name: "PROG 111", code: "PROG 111", loggedSeconds: 0, targetMinutes: 180 },
                { id: 1015, name: "SEC 105", code: "SEC 105", loggedSeconds: 0, targetMinutes: 120 },
                { id: 1016, name: "LAB REPORT", code: "LAB", loggedSeconds: 0, targetMinutes: 90 },
                { id: 1017, name: "ASSIGNMENT", code: "ASGN", loggedSeconds: 0, targetMinutes: 90 }
            ]
        }];
    }
    
    // ==================== ডেইলি রিসেট ফাংশন ====================
    function checkAndResetDaily() {
        const today = new Date().toDateString();
        const lastReset = localStorage.getItem('last_reset_date');
        
        if (lastReset !== today) {
            console.log("ডেইলি রিসেট চলছে...");
            
            // গতকালের totalElapsed সেভ করে রাখা (যদি কোনো টাইমার চলমান থাকে)
            if (timerState.totalElapsed > 0 && timerState.currentSubtaskId) {
                saveLog(timerState.currentGoalId, timerState.currentSubtaskId, timerState.currentSubtaskName, timerState.totalElapsed);
            }
            
            // টাইমার স্টেট রিসেট
            if (timerState.isRunning) {
                timerState.isRunning = false;
                timerState.startTime = null;
            }
            timerState.totalElapsed = 0;
            timerState.pausedDuration = 0;
            
            // নতুন তারিখ সেভ
            localStorage.setItem('last_reset_date', today);
            
            // UI আপডেট
            renderContent();
            showToast("📅 নতুন দিন শুরু! টাইমার রিসেট হয়েছে");
        }
    }
    
    // ==================== ডাটা লোড/সেভ ====================
    function loadData() {
        const saved = localStorage.getItem('subtask_tracker');
        goals = saved ? JSON.parse(saved) : initDefaultTrackerData();
        const savedLogs = localStorage.getItem('subtask_logs');
        taskLogs = savedLogs ? JSON.parse(savedLogs) : [];
        const savedSelected = localStorage.getItem('selected_subtask');
        if(savedSelected) selectedSubtask = JSON.parse(savedSelected);
        
        // টাইমার স্টেট লোড
        const savedTimer = localStorage.getItem('timer_state');
        if(savedTimer) {
            const parsed = JSON.parse(savedTimer);
            timerState.isRunning = parsed.isRunning || false;
            timerState.startTime = parsed.startTime;
            timerState.pausedDuration = parsed.pausedDuration || 0;
            timerState.currentGoalId = parsed.currentGoalId;
            timerState.currentSubtaskId = parsed.currentSubtaskId;
            timerState.currentSubtaskName = parsed.currentSubtaskName || "";
            timerState.totalElapsed = parsed.totalElapsed || 0;
            timerState.lastDate = parsed.lastDate;
        }
        
        // ডেইলি রিসেট চেক
        checkAndResetDaily();
        
        rebuildLoggedSeconds();
    }
    
    function rebuildLoggedSeconds() { 
        goals.forEach(g=>g.subtasks.forEach(s=>s.loggedSeconds=0)); 
        taskLogs.forEach(log=>{ 
            let g=goals.find(g=>g.id==log.goalId); 
            if(g){ 
                let s=g.subtasks.find(s=>s.id==log.subtaskId); 
                if(s) s.loggedSeconds+=log.durationSec; 
            } 
        }); 
    }
    
    function saveAll() { 
        localStorage.setItem('subtask_tracker',JSON.stringify(goals)); 
        localStorage.setItem('subtask_logs',JSON.stringify(taskLogs)); 
        if(selectedSubtask) localStorage.setItem('selected_subtask',JSON.stringify(selectedSubtask)); 
        else localStorage.removeItem('selected_subtask');
        
        localStorage.setItem('timer_state', JSON.stringify({
            isRunning: timerState.isRunning,
            startTime: timerState.startTime,
            pausedDuration: timerState.pausedDuration,
            currentGoalId: timerState.currentGoalId,
            currentSubtaskId: timerState.currentSubtaskId,
            currentSubtaskName: timerState.currentSubtaskName,
            totalElapsed: timerState.totalElapsed,
            lastDate: new Date().toDateString()
        }));
    }
    
    function saveLog(goalId,subtaskId,subtaskName,durationSec){ 
        if(durationSec<=0) return; 
        taskLogs.push({goalId,subtaskId,subtaskName,durationSec,timestamp:new Date().toISOString()}); 
        let g=goals.find(g=>g.id==goalId); 
        if(g){ 
            let s=g.subtasks.find(s=>s.id==subtaskId); 
            if(s) s.loggedSeconds+=durationSec; 
        } 
        saveAll(); 
        showToast(`✅ ${Math.floor(durationSec/60)} মিনিট "${subtaskName}" সেভ হয়েছে`);
    }
    
    function getRemainingSeconds(goalId,subtaskId){ 
        let g=goals.find(g=>g.id==goalId); 
        if(g){ 
            let s=g.subtasks.find(s=>s.id==subtaskId); 
            if(s) return Math.max(0,(s.targetMinutes*60)-s.loggedSeconds); 
        } 
        return 0; 
    }
    
    function getTodayTotalSec(){ 
        let today=new Date().toDateString(); 
        return taskLogs.filter(log=>new Date(log.timestamp).toDateString()===today).reduce((s,l)=>s+l.durationSec,0); 
    }
    
    function formatSec(sec){ 
        if(sec<0) sec=0; 
        let h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60),s=sec%60; 
        return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`; 
    }
    
    function formatDuration(sec){ 
        let hrs=Math.floor(sec/3600),mins=Math.floor((sec%3600)/60); 
        return hrs>0?`${hrs}ঘ ${mins}মি`:`${mins} মিনিট`; 
    }
    
    function showToast(msg){ 
        let t=document.createElement('div'); 
        t.style.cssText='position:fixed; bottom:90px; left:20px; right:20px; background:#10b981; color:white; padding:10px; border-radius:60px; text-align:center; z-index:1000; animation:fadeOut 2s forwards'; 
        t.innerText=msg; 
        document.body.appendChild(t); 
        setTimeout(()=>t.remove(),2000); 
    }
    
    function saveCurrentSession() {
        if(timerState.totalElapsed > 0 && timerState.currentSubtaskId) {
            saveLog(timerState.currentGoalId, timerState.currentSubtaskId, timerState.currentSubtaskName, timerState.totalElapsed);
            timerState.totalElapsed = 0;
            saveAll();
        }
    }
    
    function getCurrentElapsedSeconds() {
        if(!timerState.isRunning || !timerState.startTime) return timerState.totalElapsed;
        const now = Date.now();
        const runningSeconds = Math.floor((now - timerState.startTime) / 1000);
        return timerState.totalElapsed + runningSeconds;
    }
    
    function startCountdown() { 
        if(!selectedSubtask){ 
            showToast("প্রথমে একটি সাবটাস্ক নির্বাচন করুন"); 
            return; 
        }
        
        const {goalId,subtaskId,subtaskName}=selectedSubtask;
        
        if(timerState.currentSubtaskId !== subtaskId) {
            saveCurrentSession();
            timerState.currentGoalId = goalId;
            timerState.currentSubtaskId = subtaskId;
            timerState.currentSubtaskName = subtaskName;
            timerState.totalElapsed = 0;
            timerState.pausedDuration = 0;
        }
        
        if(!timerState.isRunning) {
            timerState.isRunning = true;
            timerState.startTime = Date.now();
            saveAll();
            showToast(`⏵ "${subtaskName}" টাইমার শুরু হয়েছে`);
            renderContent();
        } else {
            showToast(`"${subtaskName}" ইতিমধ্যে চলছে`);
        }
    }
    
    function pauseCountdown() { 
        if(!timerState.isRunning) {
            showToast("টাইমার চলছে না");
            return;
        }
        
        const elapsed = getCurrentElapsedSeconds();
        timerState.totalElapsed = elapsed;
        timerState.isRunning = false;
        timerState.startTime = null;
        
        saveAll();
        showToast(`⏸ টাইমার পaused, ${Math.floor(elapsed/60)} মিনিট সেভ হয়েছে`);
        renderContent();
    }
    
    function resetCountdown() { 
        if(timerState.isRunning) {
            const elapsed = getCurrentElapsedSeconds();
            timerState.totalElapsed = elapsed;
            timerState.isRunning = false;
            timerState.startTime = null;
            saveCurrentSession();
        } else if(timerState.totalElapsed > 0) {
            saveCurrentSession();
        }
        
        timerState.totalElapsed = 0;
        timerState.pausedDuration = 0;
        
        saveAll();
        showToast(`🔄 টাইমার রিসেট করা হয়েছে`);
        renderContent();
    }
    
    function getDisplayRemainingSeconds() {
        if(!selectedSubtask) return 0;
        const remaining = getRemainingSeconds(selectedSubtask.goalId, selectedSubtask.subtaskId);
        const currentElapsed = getCurrentElapsedSeconds();
        let displayRemaining = remaining - currentElapsed;
        return displayRemaining < 0 ? 0 : displayRemaining;
    }
    
    function updateTimerDisplay() {
        const disp = document.getElementById('countdownDisplay');
        if(disp) {
            if(selectedSubtask && timerState.isRunning) {
                const remaining = getDisplayRemainingSeconds();
                disp.innerText = formatSec(remaining);
            } else if(selectedSubtask && !timerState.isRunning) {
                const remaining = getRemainingSeconds(selectedSubtask.goalId, selectedSubtask.subtaskId);
                disp.innerText = formatSec(remaining);
            } else {
                disp.innerText = formatSec(0);
            }
        }
    }
    
    let updateInterval = null;
    function startUILoop() {
        if(updateInterval) clearInterval(updateInterval);
        updateInterval = setInterval(() => {
            updateTimerDisplay();
            if(timerState.isRunning && selectedSubtask) {
                const statusDiv = document.getElementById('timerStatus');
                if(statusDiv) {
                    const elapsed = getCurrentElapsedSeconds();
                    statusDiv.innerHTML = `<span class="running-status"><i class="fas fa-play-circle"></i> চলমান: ${formatSec(elapsed)}</span>`;
                }
            } else if(selectedSubtask && !timerState.isRunning && timerState.totalElapsed > 0) {
                const statusDiv = document.getElementById('timerStatus');
                if(statusDiv) {
                    statusDiv.innerHTML = `<span class="paused-status"><i class="fas fa-pause-circle"></i> থামানো: ${formatSec(timerState.totalElapsed)}</span>`;
                }
            }
        }, 1000);
    }
    
    function renderContent(){
        let todaySec=getTodayTotalSec(), completedSubs=goals.reduce((s,g)=>s+g.subtasks.filter(st=>st.loggedSeconds>=st.targetMinutes*60).length,0), totalSubs=goals.reduce((s,g)=>s+g.subtasks.length,0);
        let subData={}; taskLogs.forEach(l=>{ subData[l.subtaskName]=(subData[l.subtaskName]||0)+l.durationSec/60; });
        let goalsHtml='';
        
        goals.forEach(g=>{ 
            let totalSec=g.subtasks.reduce((s,st)=>s+st.loggedSeconds,0), totalTarget=g.subtasks.reduce((s,st)=>s+(st.targetMinutes*60),0), percent=totalTarget?(totalSec/totalTarget)*100:0;
            goalsHtml+=`<div class="goal-item"><div class="goal-header"><div><span class="goal-name">${g.name}</span> ${g.pinned?'📌':''}</div><div>${Math.floor(totalSec/60)}/${Math.floor(totalTarget/60)} মিনিট</div></div><div class="progress-bar-bg"><div class="progress-fill" style="width:${Math.min(100,percent)}%"></div></div><div class="subtask-list">`;
            g.subtasks.forEach(s=>{ 
                let subPercent=(s.loggedSeconds/(s.targetMinutes*60))*100, isSelected=selectedSubtask&&selectedSubtask.subtaskId===s.id;
                goalsHtml+=`<div class="subtask-item ${isSelected?'selected':''}" onclick="selectSubtask(${g.id},${s.id},'${s.name}')"><div><span class="subtask-code">📖</span><span class="subtask-name">${s.name}</span></div><div class="subtask-time" style="font-size:0.7rem;">${Math.floor(s.loggedSeconds/60)}/${s.targetMinutes} মিনিট</div><div style="width:60px;"><div class="progress-bar-bg"><div class="progress-fill" style="width:${Math.min(100,subPercent)}%"></div></div></div></div>`;
            });
            goalsHtml+=`</div></div>`;
        });
        
        let selectedInfo = "";
        let timerDisplaySec = 0;
        let statusHtml = `<div class="daily-reset-badge" style="margin-bottom: 8px;"><i class="fas fa-sync-alt"></i> প্রতিদিন রাত ১২টায় অটো রিসেট</div>`;
        
        if(selectedSubtask) {
            const savedRemaining = getRemainingSeconds(selectedSubtask.goalId, selectedSubtask.subtaskId);
            const currentElapsed = getCurrentElapsedSeconds();
            const displayRemaining = Math.max(0, savedRemaining - currentElapsed);
            timerDisplaySec = displayRemaining;
            
            if(timerState.isRunning) {
                statusHtml += `<div id="timerStatus" style="margin-bottom: 8px;"><span class="running-status"><i class="fas fa-play-circle"></i> চলমান: ${formatSec(currentElapsed)}</span></div>`;
                selectedInfo = `✅ নির্বাচিত: ${selectedSubtask.subtaskName} | বাকি: ${formatSec(displayRemaining)} | 🟢 চলছে`;
            } else if(timerState.totalElapsed > 0) {
                statusHtml += `<div id="timerStatus" style="margin-bottom: 8px;"><span class="paused-status"><i class="fas fa-pause-circle"></i> বিরতি: ${formatSec(timerState.totalElapsed)} সেভ হয়েছে</span></div>`;
                selectedInfo = `✅ নির্বাচিত: ${selectedSubtask.subtaskName} | বাকি: ${formatSec(savedRemaining)} | ⏸ বিরতি দেওয়া`;
            } else {
                statusHtml += `<div id="timerStatus" style="margin-bottom: 8px;"></div>`;
                selectedInfo = `✅ নির্বাচিত: ${selectedSubtask.subtaskName} | বাকি: ${formatSec(savedRemaining)}`;
            }
        } else {
            selectedInfo = `👆 একটি সাবটাস্ক নির্বাচন করুন`;
            statusHtml += `<div id="timerStatus" style="margin-bottom: 8px;"></div>`;
        }
        
        let html=`<div class="glass-card"><div class="section-title"><i class="fas fa-chart-line"></i> পরিসংখ্যান</div><div class="stats-row"><div class="stat-box"><div class="stat-number">${formatDuration(todaySec)}</div><div class="stat-label">আজকের মোট</div></div><div class="stat-box"><div class="stat-number">${goals.length}</div><div class="stat-label">মোট বিভাগ</div></div><div class="stat-box"><div class="stat-number">${completedSubs}/${totalSubs}</div><div class="stat-label">পূর্ণ সাবটাস্ক</div></div></div><canvas id="categoryChart"></canvas><div class="flex-between"><span style="font-size:10px;">📈 সাবটাস্ক ভিত্তিক সময়</span><button id="exportBtn" class="secondary" style="padding:4px 10px;font-size:10px;">📎 CSV</button></div></div>
        <div class="glass-card"><div class="flex-between"><div class="section-title"><i class="fas fa-bullseye"></i> আমার পড়ার সূচি</div></div><div id="goalsList">${goalsHtml}</div><div class="note-box"><i class="fas fa-info-circle"></i> সাবটাস্ক এডিট করতে সেটিংসে যান</div></div>
        <div class="glass-card"><div class="section-title"><i class="fas fa-stopwatch"></i> টাইমার</div>${statusHtml}<div style="margin-bottom:8px;font-size:0.75rem;">${selectedInfo}</div><div class="timer-display" id="countdownDisplay">${formatSec(timerDisplaySec)}</div><div class="btn-group"><button id="startBtn" class="success"><i class="fas fa-play"></i> শুরু</button><button id="pauseBtn" class="secondary"><i class="fas fa-pause"></i> বিরতি</button><button id="resetBtn" class="danger"><i class="fas fa-undo-alt"></i> রিসেট</button></div><p style="font-size:0.65rem; text-align:center; margin-top:10px; color:#7aaaff;"><i class="fas fa-info-circle"></i> শুরু করলে ব্যাকগ্রাউন্ডেও চলবে, ম্যানুয়ালি বন্ধ না করা পর্যন্ত থামবে না | প্রতিদিন রাত ১২টায় অটো রিসেট</p></div>`;
        
        document.getElementById('trackerContent').innerHTML=html;
        
        let ctx=document.getElementById('categoryChart')?.getContext('2d'); 
        if(ctx){ 
            if(progressChart) progressChart.destroy(); 
            progressChart=new Chart(ctx,{type:'pie',data:{labels:Object.keys(subData).length?Object.keys(subData):['কোনো ডাটা নেই'],datasets:[{data:Object.keys(subData).length?Object.values(subData):[1],backgroundColor:['#00f2ff','#10b981','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#ff6b6b']}]},options:{responsive:true}}); 
        }
        
        document.getElementById('startBtn')?.addEventListener('click',startCountdown); 
        document.getElementById('pauseBtn')?.addEventListener('click',pauseCountdown); 
        document.getElementById('resetBtn')?.addEventListener('click',resetCountdown);
        document.getElementById('exportBtn')?.addEventListener('click',()=>{ 
            let csv="বিভাগ,সাবটাস্ক,সময়(মিনিট),তারিখ\n"; 
            taskLogs.forEach(l=>{ csv+=`"${l.subtaskName}",${Math.floor(l.durationSec/60)},${new Date(l.timestamp).toLocaleString()}\n`; }); 
            let a=document.createElement('a'); 
            a.href=URL.createObjectURL(new Blob([csv])); 
            a.download=`study_stats_${new Date().toISOString().slice(0,10)}.csv`; 
            a.click(); 
            showToast("CSV ডাউনলোড হয়েছে"); 
        });
    }
    
    window.selectSubtask=function(goalId,subtaskId,subtaskName){ 
        if(timerState.isRunning) {
            const elapsed = getCurrentElapsedSeconds();
            timerState.totalElapsed = elapsed;
            timerState.isRunning = false;
            timerState.startTime = null;
            if(timerState.totalElapsed > 0 && timerState.currentSubtaskId) {
                saveLog(timerState.currentGoalId, timerState.currentSubtaskId, timerState.currentSubtaskName, timerState.totalElapsed);
                timerState.totalElapsed = 0;
            }
        } else if(timerState.totalElapsed > 0 && timerState.currentSubtaskId) {
            saveLog(timerState.currentGoalId, timerState.currentSubtaskId, timerState.currentSubtaskName, timerState.totalElapsed);
            timerState.totalElapsed = 0;
        }
        
        selectedSubtask = {goalId,subtaskId,subtaskName};
        timerState.currentGoalId = goalId;
        timerState.currentSubtaskId = subtaskId;
        timerState.currentSubtaskName = subtaskName;
        timerState.totalElapsed = 0;
        timerState.isRunning = false;
        timerState.startTime = null;
        
        saveAll();
        renderContent();
        showToast(`"${subtaskName}" নির্বাচিত`); 
    };
    
    document.querySelectorAll('.nav-item').forEach(btn=>{ 
        btn.addEventListener('click',()=>{ 
            let page=btn.getAttribute('data-page'); 
            if(page&&page!=='tracker.html') window.location.href=page; 
        }); 
    });
    
    // মিনিটে মিনিটে ডেইলি রিসেট চেক করা
    setInterval(() => {
        checkAndResetDaily();
    }, 60000); // প্রতি 1 মিনিটে চেক
    
    loadData(); 
    renderContent();
    startUILoop();
</script>
</body>
</html>
