<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Exam Routine | IRE - IoT & Robotics Engineering</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 20% 30%, #0a0f1a, #03060c);
            color: #eef4ff;
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.2rem;
        }
        .exam-header {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 1.5rem;
            margin: 1.5rem 0 2rem;
        }
        .back-btn {
            background: rgba(0, 242, 255, 0.15);
            border: 1px solid #00f2ff;
            color: #00f2ff;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
            text-decoration: none;
        }
        .back-btn:hover {
            background: #00f2ff;
            color: #050510;
            transform: translateY(-2px);
        }
        .semester-badge {
            background: linear-gradient(135deg, #ffaa44, #ff6644);
            padding: 8px 24px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.2rem;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 0 15px rgba(255, 102, 68, 0.4);
        }
        .exam-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }
        .exam-card {
            background: rgba(12, 22, 40, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 1.5rem;
            border: 1px solid rgba(0, 242, 255, 0.3);
            padding: 1.2rem;
            transition: 0.2s;
            position: relative;
            overflow: hidden;
        }
        .exam-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(135deg, #00f2ff, #ffaa44);
        }
        .exam-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
            border-color: rgba(0, 242, 255, 0.6);
        }
        .exam-date {
            font-family: 'Space Grotesk', monospace;
            font-size: 1rem;
            font-weight: 700;
            color: #ffaa44;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.3);
            padding: 5px 12px;
            border-radius: 30px;
            width: fit-content;
        }
        .exam-code {
            font-size: 1.3rem;
            font-weight: 800;
            color: #00f2ff;
            margin: 8px 0 4px;
        }
        .exam-name {
            font-size: 1rem;
            color: #ccdeff;
            margin-bottom: 12px;
        }
        .countdown-timer {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 30px;
            padding: 8px 12px;
            margin-top: 12px;
            font-family: 'Space Grotesk', monospace;
            font-weight: 600;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(0, 242, 255, 0.5);
        }
        .countdown-timer i {
            color: #00f2ff;
        }
        .countdown-digits {
            font-weight: 800;
            color: #fff;
            letter-spacing: 1px;
        }
        .exam-finished {
            color: #ffaa44;
            background: rgba(255, 170, 68, 0.2);
            border-color: #ffaa44;
        }
        .empty-state {
            text-align: center;
            padding: 3rem;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 2rem;
            margin-top: 1.5rem;
        }
        .empty-state i {
            font-size: 4rem;
            color: #ffaa44;
            margin-bottom: 1rem;
        }
        .empty-state p {
            font-size: 1.2rem;
            font-weight: 500;
        }
        footer {
            margin-top: 3rem;
        }
        .glass-card {
            background: rgba(12, 22, 40, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            border: 1px solid rgba(0, 242, 255, 0.2);
            padding: 1.5rem;
        }
        .social-links {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .social-links a {
            color: #eef4ff;
            background: rgba(255,255,255,0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .footer-info {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
            font-size: 0.85rem;
        }
        .developer {
            text-align: center;
            font-size: 0.8rem;
            opacity: 0.7;
        }
        @media (max-width: 700px) {
            .exam-header { flex-direction: column; gap: 1rem; }
            .back-btn, .semester-badge { justify-content: center; }
            .exam-grid { grid-template-columns: 1fr; }
        }

        /* Loading animation styles */
        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }
        #loading-overlay.hide {
            opacity: 0;
            visibility: hidden;
        }
        #deadline-loader {
            width: 581px;
            max-width: 90%;
            height: 158px;
            position: relative;
        }
        #deadline-loader svg {
            width: 100%;
            display: block;
        }
        #progress-time-fill {
            animation-name: progress-fill;
            animation-timing-function: linear;
            animation-iteration-count: infinite;
        }
        #death-group {
            animation-name: walk;
            animation-timing-function: ease;
            animation-iteration-count: infinite;
            transform: translateX(0);
        }
        #death-arm {
            animation: move-arm 3s ease infinite;
            transform-origin: -60px 74px;
        }
        #death-tool {
            animation: move-tool 3s ease infinite;
            transform-origin: -48px center;
        }
        #designer-arm-grop {
            animation: write 1.5s ease infinite;
            transform-origin: 90% top;
        }
        #red-flame {
            opacity: 0;
            animation: show-flames 5s ease infinite, red-flame 120ms ease infinite;
            transform-origin: center bottom;
        }
        #yellow-flame {
            opacity: 0;
            animation: show-flames 5s ease infinite, yellow-flame 120ms ease infinite;
            transform-origin: center bottom;
        }
        #white-flame {
            opacity: 0;
            animation: show-flames 5s ease infinite, red-flame 100ms ease infinite;
            transform-origin: center bottom;
        }
        @keyframes progress-fill {
            0% { x: -100%; }
            100% { x: -3%; }
        }
        @keyframes walk {
            0% { transform: translateX(0); }
            6% { transform: translateX(0); }
            10% { transform: translateX(100px); }
            15% { transform: translateX(140px); }
            25% { transform: translateX(170px); }
            35% { transform: translateX(220px); }
            45% { transform: translateX(280px); }
            55% { transform: translateX(340px); }
            65% { transform: translateX(370px); }
            75% { transform: translateX(430px); }
            85% { transform: translateX(460px); }
            100% { transform: translateX(520px); }
        }
        @keyframes move-arm {
            0% { transform: rotate(0); }
            5% { transform: rotate(0); }
            9% { transform: rotate(40deg); }
            80% { transform: rotate(0); }
        }
        @keyframes move-tool {
            0% { transform: rotate(0); }
            5% { transform: rotate(0); }
            9% { transform: rotate(50deg); }
            80% { transform: rotate(0); }
        }
        @keyframes write {
            0% { transform: translate(0,0) rotate(0deg) scale(1,1); }
            16% { transform: translate(0px,0px) rotate(5deg) scale(0.8,1); }
            32% { transform: translate(0px,0px) rotate(0deg) scale(1,1); }
            48% { transform: translate(0px,0px) rotate(6deg) scale(0.8,1); }
            65% { transform: translate(0px,0px) rotate(0deg) scale(1,1); }
            83% { transform: translate(0px,0px) rotate(4deg) scale(0.8,1); }
        }
        @keyframes show-flames {
            0% { opacity: 0; }
            74% { opacity: 0; }
            80% { opacity: 1; }
            99% { opacity: 1; }
            100% { opacity: 0; }
        }
        @keyframes red-flame {
            0% { transform: translateY(-30px) scale(1,1); }
            25% { transform: translateY(-30px) scale(1.1,1.1); }
            75% { transform: translateY(-30px) scale(0.8,0.7); }
            100% { transform: translateY(-30px) scale(1,1); }
        }
        @keyframes yellow-flame {
            0% { transform: translateY(-30px) scale(0.8,0.7); }
            50% { transform: translateY(-30px) scale(1.1,1.2); }
            100% { transform: translateY(-30px) scale(1,1); }
        }
    </style>
</head>

<script type="module">
    import { supabase } from './supabase.js';
    
    const loadingOverlay = document.getElementById('loading-overlay');
    const mainContent = document.getElementById('mainContent');
    const MIN_LOADING_TIME = 2500;
    let startTime = Date.now();
    let examsData = [];
    let timerInterval = null;
    
    // Helper: format remaining time
    function getRemainingTime(examDateStr) {
        const examDateTime = new Date(examDateStr);
        examDateTime.setHours(10, 0, 0, 0); // Exam starts at 10:00 AM
        const now = new Date();
        const diffMs = examDateTime - now;
        
        if (diffMs <= 0) {
            return { finished: true, text: 'শেষ হয়েছে' };
        }
        
        const totalSeconds = Math.floor(diffMs / 1000);
        const days = Math.floor(totalSeconds / 86400);
        const hours = Math.floor((totalSeconds % 86400) / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = totalSeconds % 60;
        
        let text = '';
        if (days > 0) text += `${days} দিন `;
        if (hours > 0 || days > 0) text += `${hours} ঘন্টা `;
        text += `${minutes} মিনিট ${seconds} সেকেন্ড`;
        
        return { finished: false, text, days, hours, minutes, seconds };
    }
    
    // Render all exam cards with countdowns
    function renderExams() {
        const container = document.getElementById('examRoutineContainer');
        if (!examsData || examsData.length === 0) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-calendar-times"></i><p>পরীক্ষার রুটিন প্রকাশিত হয়নি</p><p style="font-size:0.9rem; margin-top:8px;">শীঘ্রই আপডেট করা হবে</p></div>`;
            return;
        }
        
        const formatDate = (dateStr) => {
            const date = new Date(dateStr);
            return date.toLocaleDateString('bn-BD', { day: 'numeric', month: 'long', year: 'numeric' });
        };
        
        let html = `<div class="exam-grid">`;
        examsData.forEach(exam => {
            const remaining = getRemainingTime(exam.exam_date);
            const countdownClass = remaining.finished ? 'exam-finished' : '';
            const countdownIcon = remaining.finished ? '<i class="fas fa-check-circle"></i>' : '<i class="fas fa-hourglass-half"></i>';
            const countdownText = remaining.finished ? 'শেষ হয়েছে' : `বাকি: ${remaining.text}`;
            
            html += `
                <div class="exam-card">
                    <div class="exam-date">
                        <i class="fas fa-calendar-day"></i> ${formatDate(exam.exam_date)}
                    </div>
                    <div class="exam-code">${exam.course_code}</div>
                    <div class="exam-name">${exam.course_name}</div>
                    <div class="countdown-timer ${countdownClass}">
                        ${countdownIcon} <span class="countdown-digits" data-exam-date="${exam.exam_date}">${countdownText}</span>
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        container.innerHTML = html;
    }
    
    // Update all countdown timers every second
    function startCountdownUpdater() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            const countdownSpans = document.querySelectorAll('.countdown-timer .countdown-digits');
            countdownSpans.forEach(span => {
                const examDate = span.getAttribute('data-exam-date');
                if (examDate) {
                    const remaining = getRemainingTime(examDate);
                    const iconParent = span.closest('.countdown-timer');
                    if (iconParent) {
                        const icon = iconParent.querySelector('i');
                        if (remaining.finished) {
                            if (icon) icon.className = 'fas fa-check-circle';
                            iconParent.classList.add('exam-finished');
                            span.textContent = 'শেষ হয়েছে';
                        } else {
                            if (icon) icon.className = 'fas fa-hourglass-half';
                            iconParent.classList.remove('exam-finished');
                            span.textContent = `বাকি: ${remaining.text}`;
                        }
                    } else {
                        span.textContent = remaining.finished ? 'শেষ হয়েছে' : `বাকি: ${remaining.text}`;
                    }
                }
            });
        }, 1000);
    }
    
    async function loadExamRoutine() {
        try {
            const { data, error } = await supabase
                .from('exam_routine')
                .select('*')
                .order('exam_date', { ascending: true });
            
            if (error) throw error;
            examsData = data || [];
            renderExams();
            startCountdownUpdater();
            
            // Real-time subscription
            supabase.channel('exam_routine_changes')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'exam_routine' }, () => {
                    loadExamRoutine(); // reload data
                })
                .subscribe();
                
        } catch (err) {
            console.error(err);
            const container = document.getElementById('examRoutineContainer');
            container.innerHTML = `<div class="empty-state"><i class="fas fa-database"></i><p>ডেটা লোড করতে সমস্যা হয়েছে</p></div>`;
        } finally {
            const elapsed = Date.now() - startTime;
            const remaining = MIN_LOADING_TIME - elapsed;
            if (remaining > 0) {
                setTimeout(() => {
                    loadingOverlay.classList.add('hide');
                    setTimeout(() => {
                        loadingOverlay.style.display = 'none';
                        mainContent.style.display = 'block';
                    }, 600);
                }, remaining);
            } else {
                loadingOverlay.classList.add('hide');
                setTimeout(() => {
                    loadingOverlay.style.display = 'none';
                    mainContent.style.display = 'block';
                }, 600);
            }
        }
    }
    
    // Loader animation setup
    const progressFill = document.getElementById('progress-time-fill');
    const deathGroup = document.getElementById('death-group');
    const redFlame = document.getElementById('red-flame');
    const yellowFlame = document.getElementById('yellow-flame');
    const whiteFlame = document.getElementById('white-flame');
    const designerArm = document.getElementById('designer-arm-grop');
    
    function setLoaderAnimations() {
        const CYCLE = 5;
        if (progressFill) progressFill.style.animationDuration = `${CYCLE}s`;
        if (deathGroup) deathGroup.style.animationDuration = `${CYCLE}s`;
        if (designerArm) designerArm.style.animationDuration = '1.2s';
        if (redFlame) redFlame.style.animationDuration = `${CYCLE}s, 120ms`;
        if (yellowFlame) yellowFlame.style.animationDuration = `${CYCLE}s, 120ms`;
        if (whiteFlame) whiteFlame.style.animationDuration = `${CYCLE}s, 100ms`;
    }
    
    function restartLoaderAnimations() {
        if (progressFill) {
            progressFill.style.animation = 'none';
            progressFill.offsetHeight;
            progressFill.style.animation = `progress-fill 5s linear infinite`;
        }
        if (deathGroup) {
            deathGroup.style.animation = 'none';
            deathGroup.offsetHeight;
            deathGroup.style.animation = `walk 5s ease infinite`;
        }
        if (redFlame) {
            redFlame.style.animation = 'none';
            redFlame.offsetHeight;
            redFlame.style.animation = `show-flames 5s ease infinite, red-flame 120ms ease infinite`;
        }
        if (yellowFlame) {
            yellowFlame.style.animation = 'none';
            yellowFlame.offsetHeight;
            yellowFlame.style.animation = `show-flames 5s ease infinite, yellow-flame 120ms ease infinite`;
        }
        if (whiteFlame) {
            whiteFlame.style.animation = 'none';
            whiteFlame.offsetHeight;
            whiteFlame.style.animation = `show-flames 5s ease infinite, red-flame 100ms ease infinite`;
        }
    }
    
    setLoaderAnimations();
    restartLoaderAnimations();
    loadExamRoutine();
</script>
</body>
</html>
