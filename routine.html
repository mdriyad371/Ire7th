<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Live Routine | IRE - IoT & Robotics Engineering</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0f1f; font-family: 'Inter', 'Space Grotesk', sans-serif; color: #f0f3ff; overflow-x: hidden; padding-bottom: 80px; }
        .tech-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 20% 10%, #01031a, #000000); z-index: -2; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px 25px 50px; position: relative; z-index: 2; }

        /* Bottom Navigation */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(5,15,30,0.95); backdrop-filter: blur(12px); display: flex; justify-content: space-around; align-items: center; padding: 6px 12px 15px; border-top: 1px solid rgba(0,242,255,0.3); z-index: 100; }
        .nav-item { background: none; border: none; color: #8e9aaf; display: flex; flex-direction: column; align-items: center; gap: 3px; font-size: 0.6rem; cursor: pointer; padding: 4px 10px; border-radius: 40px; transition: 0.2s; }
        .nav-item i { font-size: 1.1rem; }
        .nav-item.active { color: #00f2ff; background: #00f2ff20; }

        .section-container { background: rgba(5,10,25,0.5); backdrop-filter: blur(10px); border-radius: 1.5rem; padding: 1.5rem; border: 1px solid rgba(0,242,255,0.2); }
        .glass-card { background: rgba(10,20,35,0.6); backdrop-filter: blur(10px); border-radius: 1.2rem; padding: 1.2rem; margin-bottom: 1.2rem; border: 1px solid rgba(0,242,255,0.15); }
        .routine-status-grid { display: flex; flex-direction: column; gap: 1rem; }
        .status-item { background: rgba(0,242,255,0.05); border-radius: 1.2rem; padding: 1rem; border-left: 4px solid #00f2ff; }
        .status-label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; color: #00f2ff; }
        .status-value { font-size: 1rem; font-weight: 500; margin-top: 8px; display: flex; flex-direction: column; gap: 8px; }
        .class-entry-simple { background: rgba(255,255,255,0.05); padding: 8px 12px; border-radius: 16px; margin-bottom: 6px; }
        .room-chip { background: #1f3a4b; padding: 0.15rem 0.7rem; border-radius: 30px; font-size: 0.7rem; display: inline-block; margin-top: 5px; }
        .no-class { color: #ffaa44; font-weight: 500; }
        .countdown-timer { font-family: monospace; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 40px; display: inline-flex; align-items: center; gap: 6px; font-size: 0.8rem; border: 1px solid #00f2ff80; margin-top: 6px; }
        .weekly-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 0.8rem; margin-top: 0.8rem; }
        .day-card { background: rgba(0,0,0,0.3); border-radius: 1rem; padding: 0.8rem; border: 1px solid rgba(0,242,255,0.2); }
        .day-name { font-weight: 700; font-size: 1rem; border-bottom: 2px solid #00f2ff; display: inline-block; margin-bottom: 10px; color: #00f2ff; }
        .class-entry { margin-bottom: 10px; font-size: 0.75rem; background: rgba(255,255,255,0.03); padding: 6px; border-radius: 10px; }
        .class-time { font-family: monospace; font-weight: 600; color: #9acdff; font-size: 0.7rem; }
        .session-badge { background: linear-gradient(135deg, #ffaa44, #ff6644); padding: 4px 12px; border-radius: 30px; font-size: 0.7rem; display: inline-flex; align-items: center; gap: 5px; }
        .live-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px dashed #00f2ff; }
        .current-time-badge { background: #041e2c; padding: 0.3rem 0.8rem; border-radius: 40px; font-family: monospace; font-size: 0.7rem; border: 1px solid #2c7da0; }
        .exam-routine-btn { background: linear-gradient(135deg, #ffaa44, #ff6644); border: none; color: #fff; padding: 8px 20px; border-radius: 50px; font-weight: 600; font-size: 0.8rem; cursor: pointer; margin-bottom: 1rem; }
        footer { background: rgba(3,8,20,0.85); border-radius: 1rem; padding: 0.8rem; text-align: center; margin-top: 1.5rem; font-size: 0.6rem; }
        @media (max-width: 768px) { .container { padding: 15px; } .weekly-grid { grid-template-columns: 1fr; } .live-header { flex-direction: column; align-items: flex-start; } }
    </style>
</head>
<body>
<div class="tech-bg"></div>
<div class="container">
    <div style="display: flex; justify-content: flex-end;"><button class="exam-routine-btn" id="viewExamRoutineBtn"><i class="fas fa-calendar-alt"></i> View Exam Routine</button></div>
    <div class="section-container">
        <div class="glass-card" style="border-left: 4px solid #00f2ff;">
            <div class="live-header"><div class="current-time-badge" id="currentDateTimeDisplay"><i class="far fa-clock"></i> লোড হচ্ছে...</div></div>
            <div class="routine-status-grid">
                <div class="status-item"><div class="status-label"><i class="fas fa-chalkboard-teacher"></i> এখন চলমান ক্লাস</div><div class="status-value" id="currentClassDisplay">—</div><div class="countdown-timer" id="currentClassCountdown"><i class="fas fa-hourglass-half"></i> <span>--:--:--</span></div></div>
                <div class="status-item"><div class="status-label"><i class="fas fa-forward-step"></i> পরবর্তী ক্লাস</div><div class="status-value" id="nextClassDisplay">—</div><div class="countdown-timer" id="nextClassCountdown"><i class="fas fa-clock"></i> <span>--:--:--</span></div></div>
            </div>
        </div>
        <div class="glass-card">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 15px;">
                <span class="session-badge"><i class="fas fa-calendar-alt"></i> সেশন: ২০২৪-২৫ | L1T2 | IRE ৭ম ব্যাচ</span>
                <span style="font-size: 0.7rem;"><i class="fas fa-door-open"></i> রুম নম্বরসহ সম্পূর্ণ রুটিন</span>
            </div>
            <div id="fullTimetableContainer"><div style="text-align: center; padding: 1.5rem;"><i class="fas fa-spinner fa-pulse"></i> রুটিন লোড হচ্ছে...</div></div>
        </div>
    </div>
    <footer><i class="fas fa-code"></i> Developed by <strong>Md Riyad Hossen</strong> (IRE 7th Batch)<br>© 2026 Department of IoT & Robotics Engineering | UFTB</footer>
</div>
<div class="bottom-nav">
    <button class="nav-item" data-page="index.html"><i class="fas fa-home"></i><span>হোম</span></button>
    <button class="nav-item active" data-page="routine.html"><i class="fas fa-calendar-alt"></i><span>রুটিন</span></button>
    <button class="nav-item" data-page="tracker.html"><i class="fas fa-stopwatch"></i><span>টাইম ট্র্যাকার</span></button>
    <button class="nav-item" data-page="settings.html"><i class="fas fa-cog"></i><span>সেটিংস</span></button>
</div>
<script type="module">
    import { supabase } from './supabase.js';
    let CLASS_SCHEDULE = [];
    function timeToMinutes(t) { let [h,m]=t.split(':').map(Number); return h*60+m; }
    function formatToAmPm(t) { let [h,m]=t.split(':').map(Number); let p = h>=12?'PM':'AM'; let h12 = h%12||12; return `${h12}:${m.toString().padStart(2,'0')} ${p}`; }
    function getCurrentDateTime() { let d=new Date(); let days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday']; return { now:d, currentDayName:days[d.getDay()], currentMinutes:d.getHours()*60+d.getMinutes(), currentDayIndex:d.getDay(), currentSeconds:d.getSeconds() }; }
    function getTodaySchedule(day) { return CLASS_SCHEDULE.filter(c=>c.day===day).sort((a,b)=>timeToMinutes(a.start_time)-timeToMinutes(b.start_time)); }
    function getCurrentClasses(schedule, mins) { return schedule.filter(c=>mins>=timeToMinutes(c.start_time) && mins<timeToMinutes(c.end_time)); }
    function getGlobalNextClass() {
        let {currentDayName, currentMinutes, currentDayIndex} = getCurrentDateTime();
        let all = CLASS_SCHEDULE.map(c=>{ let idx=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'].indexOf(c.day); let offset=0; if(idx<currentDayIndex) offset=7; else if(idx===currentDayIndex && timeToMinutes(c.start_time)<=currentMinutes) offset=7; return {...c, clsTimestamp:(offset+idx)*1440+timeToMinutes(c.start_time)}; });
        let nowAbs = currentDayIndex*1440+currentMinutes;
        let future = all.filter(c=>c.clsTimestamp>nowAbs).sort((a,b)=>a.clsTimestamp-b.clsTimestamp);
        if(!future.length) return null;
        let next=future[0];
        let days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
        let targetDay=days[Math.floor(next.clsTimestamp/1440)%7];
        let suffix = targetDay===currentDayName ? ' (আজ)' : ((Math.floor(next.clsTimestamp/1440)%7 === currentDayIndex+1) || (currentDayIndex===6 && targetDay==='Sunday')) ? ' (আগামীকাল)' : '';
        return {...next, displayDay:targetDay+suffix};
    }
    function updateLiveStatus() {
        let {currentDayName, currentMinutes, now} = getCurrentDateTime();
        let today = getTodaySchedule(currentDayName);
        let current = getCurrentClasses(today, currentMinutes);
        let curDiv=document.getElementById('currentClassDisplay'), nextDiv=document.getElementById('nextClassDisplay');
        if(currentDayName==='Thursday'||currentDayName==='Friday'||currentDayName==='Saturday') curDiv.innerHTML='<div class="no-class"><i class="fas fa-bed"></i> আজকে কোনো ক্লাস নেই (ছুটি)</div>';
        else if(today.length===0) curDiv.innerHTML='<div class="no-class"><i class="fas fa-hourglass-end"></i> আজকের জন্য কোনো ক্লাস নেই</div>';
        else if(current.length>0) curDiv.innerHTML=current.map(c=>`<div class="class-entry-simple"><strong>📖 ${c.course}</strong> (${formatToAmPm(c.start_time)} – ${formatToAmPm(c.end_time)})<div class="room-chip"><i class="fas fa-door-closed"></i> ${c.room}</div></div>`).join('');
        else curDiv.innerHTML='<div class="no-class"><i class="fas fa-ban"></i> বর্তমানে কোনো ক্লাস চলছে না</div>';
        let nextG=getGlobalNextClass();
        if(nextG) nextDiv.innerHTML=`<div class="class-entry-simple"><strong>📌 ${nextG.course}</strong> (${formatToAmPm(nextG.start_time)} – ${formatToAmPm(nextG.end_time)}) <span class="next-class-day" style="font-size:0.7rem;background:#0e2a36;display:inline-block;padding:0.15rem 0.6rem;border-radius:30px;">${nextG.displayDay}</span><div class="room-chip"><i class="fas fa-door-closed"></i> ${nextG.room}</div></div>`;
        else nextDiv.innerHTML='<div class="no-class">✅ কোনো পরবর্তী ক্লাস নেই</div>';
        let opt = { weekday:'long', year:'numeric', month:'long', day:'numeric', hour:'2-digit', minute:'2-digit' };
        document.getElementById('currentDateTimeDisplay').innerHTML = `<i class="far fa-calendar-alt"></i> ${now.toLocaleDateString('bn-BD', opt)}`;
    }
    function getRemainingSecondsForCurrent() {
        let {currentDayName, currentMinutes, currentSeconds} = getCurrentDateTime();
        let today = getTodaySchedule(currentDayName);
        let currentClasses = getCurrentClasses(today, currentMinutes);
        if(currentClasses.length === 0) return null;
        let ongoing = currentClasses[0];
        let endMin = timeToMinutes(ongoing.end_time);
        let endTotalSec = endMin * 60;
        let nowTotalSec = currentMinutes * 60 + currentSeconds;
        let remaining = endTotalSec - nowTotalSec;
        return remaining > 0 ? remaining : 0;
    }
    function getRemainingForNext() {
        let next = getGlobalNextClass();
        if(!next) return null;
        let targetDayIdx = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'].indexOf(next.day);
        let startMins = timeToMinutes(next.start_time);
        let targetAbsSec = targetDayIdx * 86400 + startMins * 60;
        let currentAbsSec = (getCurrentDateTime().currentDayIndex * 86400) + (getCurrentDateTime().currentMinutes * 60) + getCurrentDateTime().currentSeconds;
        let diffSec = targetAbsSec - currentAbsSec;
        if(diffSec < 0) diffSec += 7 * 86400;
        return { remainingSeconds: diffSec };
    }
    function formatCountdown(seconds) { if(seconds===null||seconds<0) return "--:--:--"; let h=Math.floor(seconds/3600), m=Math.floor((seconds%3600)/60), s=seconds%60; return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`; }
    function updateCountdownTimers() {
        let currentRemSec = getRemainingSecondsForCurrent();
        let currentCountdownElem = document.getElementById('currentClassCountdown');
        if(currentRemSec !== null && currentRemSec > 0) currentCountdownElem.innerHTML = `<i class="fas fa-hourglass-end"></i> শেষ হতে: ${formatCountdown(currentRemSec)}`;
        else if(currentRemSec !== null && currentRemSec === 0) currentCountdownElem.innerHTML = `<i class="fas fa-check-circle"></i> শেষ হয়েছে`;
        else currentCountdownElem.innerHTML = `<i class="fas fa-ban"></i> কোনো ক্লাস চলছে না`;
        let nextData = getRemainingForNext();
        let nextCountdownElem = document.getElementById('nextClassCountdown');
        if(nextData && nextData.remainingSeconds > 0) nextCountdownElem.innerHTML = `<i class="fas fa-hourglass-start"></i> শুরু হতে: ${formatCountdown(nextData.remainingSeconds)}`;
        else if(nextData && nextData.remainingSeconds === 0) nextCountdownElem.innerHTML = `<i class="fas fa-play"></i> শুরু হয়েছে!`;
        else nextCountdownElem.innerHTML = `<i class="fas fa-calendar-times"></i> কোনো ক্লাস নেই`;
    }
    function renderFullTimetable() {
        let days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
        let bd={Sunday:'রবিবার',Monday:'সোমবার',Tuesday:'মঙ্গলবার',Wednesday:'বুধবার',Thursday:'বৃহস্পতিবার',Friday:'শুক্রবার',Saturday:'শনিবার'};
        let html=`<div class="weekly-grid">`;
        for(let day of days){
            let classes=CLASS_SCHEDULE.filter(c=>c.day===day).sort((a,b)=>timeToMinutes(a.start_time)-timeToMinutes(b.start_time));
            html+=`<div class="day-card"><div class="day-name">${bd[day]}</div>`;
            if(day==='Thursday'||day==='Friday'||day==='Saturday') html+=`<div style="padding:10px 0;text-align:center;opacity:0.7;"><i class="fas fa-coffee"></i> ছুটি</div>`;
            else if(classes.length===0) html+=`<div style="padding:10px 0;text-align:center;">📭 কোনো ক্লাস নেই</div>`;
            else classes.forEach(c=>{ html+=`<div class="class-entry"><div class="class-time"><i class="far fa-clock"></i> ${formatToAmPm(c.start_time)} – ${formatToAmPm(c.end_time)}</div><div><strong>${c.course}</strong></div><div class="class-room" style="background:#122b38;display:inline-block;padding:2px 6px;border-radius:20px;font-size:0.65rem;margin-top:3px;"><i class="fas fa-door-open"></i> ${c.room}</div></div>`; });
            html+=`</div>`;
        }
        html+=`</div><div style="margin-top:10px;font-size:0.65rem;text-align:center;border-top:1px dashed #2c7da0;padding-top:8px;"><i class="fas fa-info-circle"></i> রুটিন এডমিন প্যানেল থেকে পরিবর্তনযোগ্য</div>`;
        document.getElementById('fullTimetableContainer').innerHTML=html;
    }
    async function loadRoutine() {
        const { data, error } = await supabase.from('routine').select('*');
        if (!error && data) { CLASS_SCHEDULE = data; renderFullTimetable(); updateLiveStatus(); updateCountdownTimers(); }
    }
    document.querySelectorAll('.nav-item').forEach(btn => { btn.addEventListener('click', () => { const page = btn.getAttribute('data-page'); if(page && page !== 'routine.html') window.location.href = page; }); });
    loadRoutine();
    setInterval(updateLiveStatus, 60000);
    setInterval(updateCountdownTimers, 1000);
    supabase.channel('routine_changes').on('postgres_changes', { event: '*', schema: 'public', table: 'routine' }, () => loadRoutine()).subscribe();
    document.getElementById('viewExamRoutineBtn').addEventListener('click', () => window.location.href = 'exam.html');
</script>
</body>
</html>
