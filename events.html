<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Events | IRE - IoT & Robotics Engineering</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .events-grid { display: flex; flex-direction: column; gap: 2rem; }
        .event-card { background: rgba(10,20,35,0.65); backdrop-filter: blur(12px); border-radius: 1.8rem; border: 1px solid rgba(76,201,255,0.25); overflow: hidden; display: flex; flex-wrap: wrap; transition: transform 0.2s; }
        .event-card:hover { transform: translateY(-4px); }
        .event-image { flex: 0 0 280px; background: #0a1424; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .event-image img { width: 100%; height: 100%; object-fit: cover; }
        .event-details { flex: 1; padding: 1.6rem 2rem; }
        .event-date { font-size: 0.85rem; color: #8bb9fe; margin-bottom: 0.6rem; display: flex; align-items: center; gap: 8px; }
        .event-title { font-size: 1.6rem; font-weight: 700; margin-bottom: 1rem; color: #fff; }
        .event-description { font-size: 0.95rem; color: #cddff9; line-height: 1.6; margin-bottom: 1rem; }
        .event-meta { display: flex; flex-wrap: wrap; gap: 1rem; font-size: 0.85rem; color: #9bb5e0; border-top: 1px dashed rgba(76,201,255,0.3); padding-top: 1rem; margin-top: 0.5rem; }
        @media (max-width: 780px) { .event-card { flex-direction: column; } .event-image { flex-basis: 200px; } .event-title { font-size: 1.3rem; } }
    </style>
</head>
<body>
<div class="tech-bg"></div>
<div class="container">
    <div class="navbar">
        <div class="logo-area"><div class="university-logo"><img src="images/logo.png" alt="Logo" style="width:100%; height:100%; object-fit:cover;" onerror="this.onerror=null; this.parentElement.innerHTML='<i class=\'fas fa-microchip\'></i>';"></div><div class="univ-title"><h1>University of Frontier Technology, Bangladesh</h1><p><i class="fas fa-robot"></i> Internet of Things and Robotics Engineering (IRE)</p></div></div>
        <div class="nav-links">
            <a href="index.html">🏠 Home</a> <a href="routine.html">📅 Routine</a> <a href="courses.html">📚 Courses</a> <a href="events.html" class="active">🎉 Events</a> <a href="notices.html">📢 Notices</a> <a href="batchfund.html">💰 Batch Fund/a>
            <a href="#" id="umsNavLink" target="_blank"><i class="fas fa-graduation-cap"></i> UMS</a> <a href="#" id="moodleNavLink" target="_blank"><i class="fas fa-chalkboard"></i> Moodle</a>
        </div>
    </div>
    <div class="section-container"><div class="section-title"><i class="fas fa-calendar-week"></i> সাম্প্রতিক ইভেন্ট</div><div class="events-grid" id="eventsGrid"></div></div>
</div>
<footer>...</footer>
<script type="module">
    import { supabase } from './supabase.js';
    async function loadEvents() {
        const { data, error } = await supabase.from('events').select('*');
        if (!error && data) {
            document.getElementById('eventsGrid').innerHTML = data.map(e => `
                <div class="event-card">
                    <div class="event-image"><img src="${e.image || 'https://via.placeholder.com/280x200?text=No+Image'}" alt="${e.title}"></div>
                    <div class="event-details">
                        <div class="event-date"><i class="far fa-calendar-alt"></i> ${e.date}</div>
                        <div class="event-title">${e.title}</div>
                        <div class="event-description">${e.description}</div>
                        <div class="event-meta"><span><i class="fas fa-map-marker-alt"></i> Academic Building</span><span><i class="far fa-clock"></i> TBD</span></div>
                    </div>
                </div>
            `).join('');
        }
    }
    loadEvents();
    supabase.channel('events_changes').on('postgres_changes', { event: '*', schema: 'public', table: 'events' }, () => loadEvents()).subscribe();
    const UMS_URL = "https://ums.uftb.ac.bd/Login/Index";
    const MOODLE_URL = "https://moodle.uftb.ac.bd/login/index.php";
    document.getElementById('umsNavLink').href = UMS_URL;
    document.getElementById('moodleNavLink').href = MOODLE_URL;
</script>
</body>
</html>
